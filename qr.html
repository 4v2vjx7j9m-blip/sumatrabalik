  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1000px; height: 1000px;
    background: linear-gradient(145deg, #0D2137 0%, #0a3d52 50%, #0D2137 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Outfit', sans-serif;
  }
  .card {
    width: 860px; height: 860px;
    background: linear-gradient(160deg, #0f2a45 0%, #0a3d52 100%);
    border-radius: 32px;
    border: 1px solid rgba(180,155,60,0.3);
    box-shadow: 0 0 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 24px; padding: 48px;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(180,155,60,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .card::after {
    content: '';
    position: absolute; bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(0,180,200,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .divider { width: 60px; height: 2px; background: #C4963C; border-radius: 2px; }
  .title {
    font-family: 'Playfair Display', serif;
    font-size: 52px; font-weight: 700;
    color: #FDFAF3; text-align: center; letter-spacing: 2px;
    line-height: 1.1;
  }
  .title span { color: #C4963C; }
  .subtitle {
    font-size: 15px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(253,250,243,0.7); text-align: center;
  }
  .qr-wrapper {
    background: #FDFAF3; border-radius: 20px;
    padding: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    position: relative; z-index: 1;
  }
  .qr-wrapper img { display: block; width: 320px; height: 320px; }
  .address {
    font-size: 13px; color: rgba(253,250,243,0.55); text-align: center;
    letter-spacing: 1px; line-height: 1.8; position: relative; z-index: 1;
  }
  .scan-text {
    font-size: 14px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase;
    color: #C4963C; text-align: center; position: relative; z-index: 1;
  }
</style>
